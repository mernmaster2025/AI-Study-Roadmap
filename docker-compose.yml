# Optional local Postgres, for when you outgrow the default SQLite file.
# Start with:  docker compose up -d
# Then set in backend/.env:
#   DATABASE_URL=postgresql+psycopg2://study:study@localhost:5432/study_platform
# and install the Postgres driver:  pip install -r backend/requirements-postgres.txt
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: study
      POSTGRES_PASSWORD: study
      POSTGRES_DB: study_platform
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
